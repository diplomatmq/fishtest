version: "3.8"

services:
  app:
    build: .
    depends_on:
      - postgres
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      DATABASE_URL: postgresql://postgres:password@postgres:5432/fishbot
    restart: unless-stopped

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: fishbot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
